<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting to Paytm...</title>
</head>
<body>
    <h1>Please wait, redirecting to Paytm...</h1>
    <form name="paytmForm" method="POST" action="https://securegw-stage.paytm.in/order/process">
        {% for key, value in paytm_params.items %}
            <input type="hidden" name="{{ key }}" value="{{ value }}">
        {% endfor %}
    </form>
    <script type="text/javascript">
        document.paytmForm.submit();
    </script>
</body>
</html>
