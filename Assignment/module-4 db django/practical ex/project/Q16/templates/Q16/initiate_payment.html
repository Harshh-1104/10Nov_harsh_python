<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Consultation Billing | Doctor Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --secondary: #10b981;
            --background: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .billing-card {
            background-color: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 14px;
        }

        .billing-details {
            margin-bottom: 30px;
            border-top: 2px dashed var(--border);
            padding-top: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .detail-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .detail-value {
            font-weight: 600;
        }

        .total-section {
            background-color: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label {
            font-size: 18px;
            font-weight: 700;
        }

        .total-amount {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .payment-form {
            text-align: center;
        }

        .amount-input-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .amount-input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .amount-input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .amount-input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .pay-button {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
        }

        .pay-button:hover {
            background-color: var(--primary-dark);
        }

        .pay-button:active {
            transform: scale(0.98);
        }

        .paytm-logo {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .paytm-logo img {
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="billing-card">
        <div class="header">
            <h1>Doctor Finder Billing</h1>
            <p>Secure Medical Consultation Payment</p>
        </div>

        <div class="billing-details">
            <div class="detail-row">
                <span class="detail-label">Service</span>
                <span class="detail-value">Doctor Consultation Fee</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Patient ID</span>
                <span class="detail-value">#{{ patient_info.patient_id }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Date</span>
                <span class="detail-value">{% now "M d, Y" %}</span>
            </div>
        </div>

        <form method="POST" class="payment-form">
            {% csrf_token %}
            <input type="hidden" name="patient_id" value="{{ patient_info.patient_id }}">
            
            <div class="amount-input-group">
                <label for="name">Patient Full Name</label>
                <input type="text" name="name" id="name" placeholder="Enter patient name" required>
            </div>

            <div class="amount-input-group">
                <label for="city">City</label>
                <input type="text" name="city" id="city" placeholder="Enter city" required>
            </div>

            <div class="amount-input-group">
                <label for="amount">Enter Consultation Amount (₹)</label>
                <input type="number" name="amount" id="amount" placeholder="e.g. 500" required>
            </div>

            <button type="submit" class="pay-button">Proceed to Payment</button>
            <div class="paytm-logo">
                <span>Powered by</span>
                <img src="https://static2.tripoto.com/media/filter/tst/img/673193/TripDocument/1560940520_paytm_logo_960x498_1.png" alt="Paytm">
            </div>
        </form>
    </div>
</body>
</html>
