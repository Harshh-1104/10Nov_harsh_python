<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration</title>
    <style>
        :root {
            --primary: #4834d4;
            --secondary: #686de0;
            --bg: #f0f2f5;
            --text: #2d3436;
            --error: #eb4d4b;
            --success: #6ab04c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .form-container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 450px;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .form-container:hover {
            transform: translateY(-5px);
        }

        h2 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--primary);
            font-size: 2rem;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 8px rgba(72, 52, 212, 0.2);
        }

        .error-message {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: var(--secondary);
        }

        input.invalid {
            border-color: var(--error);
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Patient Registration</h2>
        <form id="registrationForm" onsubmit="return validateForm(event)">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your full name">
                <div id="nameError" class="error-message">Name is required (min 3 characters)</div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="text" id="email" placeholder="example@mail.com">
                <div id="emailError" class="error-message">Please enter a valid email</div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="10-digit number">
                <div id="phoneError" class="error-message">Please enter a valid 10-digit phone number</div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Minimum 6 characters">
                <div id="passwordError" class="error-message">Password must be at least 6 characters</div>
            </div>

            <button type="submit" class="submit-btn">Register Now</button>
        </form>
    </div>

    <script>
        function validateForm(event) {
            event.preventDefault();
            
            let isValid = true;
            
            const fullname = document.getElementById('fullname');
            const email = document.getElementById('email');
            const phone = document.getElementById('phone');
            const password = document.getElementById('password');

            // Reset errors
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
            document.querySelectorAll('input').forEach(el => el.classList.remove('invalid'));

            // Name validation
            if (fullname.value.trim().length < 3) {
                document.getElementById('nameError').style.display = 'block';
                fullname.classList.add('invalid');
                isValid = false;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email.value)) {
                document.getElementById('emailError').style.display = 'block';
                email.classList.add('invalid');
                isValid = false;
            }

            // Phone validation
            const phoneRegex = /^[0-9]{10}$/;
            if (!phoneRegex.test(phone.value)) {
                document.getElementById('phoneError').style.display = 'block';
                phone.classList.add('invalid');
                isValid = false;
            }

            // Password validation
            if (password.value.length < 6) {
                document.getElementById('passwordError').style.display = 'block';
                password.classList.add('invalid');
                isValid = false;
            }

            if (isValid) {
                alert('Registration Successful! (Client-side validation passed)');
                // In a real app, you would submit the form here:
                // event.target.submit();
            }

            return isValid;
        }
    </script>
</body>
</html>
