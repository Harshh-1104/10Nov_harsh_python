<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Doctor - Q11</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .container { margin-top: 100px; max-width: 500px; }
        .card { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card p-5">
            <h2 class="text-danger mb-4">Confirm Deletion</h2>
            <p>Are you sure you want to delete the record for <strong>{{ doctor.name }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-danger">Yes, Delete Record</button>
                    <a href="{% url 'doctor_crud_list' %}" class="btn btn-outline-secondary">No, Go Back</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
