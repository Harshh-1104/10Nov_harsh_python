<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f4f6fb;
      color: #111827;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem;
      background: #ffffff;
      border-radius: 1rem;
      box-shadow: 0 14px 28px rgba(11, 18, 39, 0.1);
    }

    h1 {
      margin-top: 0;
      color: #1f2937;
    }

    p {
      line-height: 1.6;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <p>simple pageeeee</p>
  </div>
</body>
</html>
