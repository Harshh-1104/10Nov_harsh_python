<!DOCTYPE html>
<html lang="en">
<head>

    <title>{{ title }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }

    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="{% url 'q9_home' %}">Home</a>
            <a href="{% url 'q9_about' %}">About</a>

            <a href="{% url 'q9_services' %}">Services</a>
        </nav>
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        <p>Create a Django project with URL patterns and corresponding views and templates.</p>
    </div>
</body>
</html>
