<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Product</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .product-details { background: #f8f9fa; padding: 15px; border-radius: 4px; margin: 20px 0; }
        .btn { padding: 10px 15px; text-decoration: none; border-radius: 4px; color: white; margin-right: 10px; display: inline-block; }
        .btn-danger { background: #dc3545; }
        .btn-secondary { background: #6c757d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Delete Product</h1>
        <p>Are you sure you want to delete this product?</p>
        <div class="product-details">
            <strong>{{ product.name }}</strong><br>
            {{ product.description }}<br>
            Price: ${{ product.price }} | Stock: {{ product.stock }}
        </div>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'q12_home' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
